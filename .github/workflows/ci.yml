name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

defaults:
  run:
    working-directory: hospital-system

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
          - service: auth-service
          - service: patient-service
          - service: doctor-service
          - service: appointment-service
          - service: notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.service }}/requirements.txt

      - name: pytest (service)
        env:
          JWT_SECRET: test-secret
          INTERNAL_SERVICE_TOKEN: internal-token
          AUTH_DATABASE_URL: sqlite+aiosqlite:///:memory:
          PATIENT_DATABASE_URL: sqlite+aiosqlite:///:memory:
          DOCTOR_DATABASE_URL: sqlite+aiosqlite:///:memory:
          APPOINTMENT_DATABASE_URL: sqlite+aiosqlite:///:memory:
          PATIENT_SERVICE_URL: http://localhost:8002
          DOCTOR_SERVICE_URL: http://localhost:8003
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
        run: |
          cd ${{ matrix.service }}
          pytest -q

      - name: pytest (repo layout smoke)
        if: matrix.service == 'api-gateway'
        run: pytest -q tests

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config
        working-directory: hospital-system
        run: docker compose config

      - name: docker compose build
        working-directory: hospital-system
        run: docker compose build
