name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-services:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api_gateway, auth_service, task_service, notification_service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          pytest tests