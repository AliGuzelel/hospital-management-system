services:
  api-gateway:
    build: ./api-gateway
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      auth-service: {condition: service_healthy}
      patient-service: {condition: service_healthy}
      doctor-service: {condition: service_healthy}
      appointment-service: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
  auth-service:
    build: ./auth-service
    ports: ["8001:8001"]
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
  patient-service:
    build: ./patient-service
    ports: ["8002:8002"]
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
  doctor-service:
    build: ./doctor-service
    ports: ["8003:8003"]
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
  appointment-service:
    build: ./appointment-service
    ports: ["8004:8004"]
    env_file: .env
    depends_on:
      rabbitmq: {condition: service_healthy}
      patient-service: {condition: service_healthy}
      doctor-service: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
  notification-service:
    build: ./notification-service
    ports: ["8005:8005"]
    env_file: .env
    depends_on:
      rabbitmq: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
